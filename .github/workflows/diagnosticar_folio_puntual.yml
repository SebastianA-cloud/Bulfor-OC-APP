name: Diagnosticar folio puntual

on:
  workflow_dispatch:

jobs:
  diagnosticar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar diagnóstico
        env:
          DTEBOX_IP: ${{ secrets.DTEBOX_IP }}
          GDEXPRESS_API_KEY: ${{ secrets.GDEXPRESS_API_KEY }}
        run: python diagnosticar_folio_puntual.py

      - name: Subir el XML de resultado
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: folio-21434-xml
          path: folio_21434.xml
          if-no-files-found: ignore
