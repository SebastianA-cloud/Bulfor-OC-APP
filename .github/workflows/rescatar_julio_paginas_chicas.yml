name: Rescatar julio (páginas chicas)

on:
  workflow_dispatch:

jobs:
  rescatar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests supabase

      - name: Ejecutar rescate
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DTEBOX_IP: ${{ secrets.DTEBOX_IP }}
          GDEXPRESS_API_KEY: ${{ secrets.GDEXPRESS_API_KEY }}
        run: python rescatar_julio_paginas_chicas.py
