name: Sincronizar facturas desde GDExpress

on:
  schedule:
    - cron: '15 6 * * *'  # 3:15am hora Chile (15 min después de Mercado Público)
  workflow_dispatch:  # permite ejecutarlo manualmente con un botón

jobs:
  sincronizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests supabase

      - name: Ejecutar sincronización
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DTEBOX_IP: ${{ secrets.DTEBOX_IP }}
          GDEXPRESS_API_KEY: ${{ secrets.GDEXPRESS_API_KEY }}
        run: python sincronizar_gdexpress.py
