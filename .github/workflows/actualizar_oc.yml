name: Actualizar OC desde Mercado Público

on:
  schedule:
    - cron: '0 6 * * *'  # 3am hora Chile
  workflow_dispatch:  # permite ejecutarlo manualmente con un botón

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests supabase

      - name: Ejecutar script de actualización
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          MP_TICKET:    ${{ secrets.MP_TICKET }}
          MP_CODIGO_PROVEEDOR: ${{ secrets.MP_CODIGO_PROVEEDOR }}
        run: python actualizar_oc_final.py
